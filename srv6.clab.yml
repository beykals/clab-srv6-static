name: srv6-static-te-r1-r8
prefix: ""

mgmt:
  network: srv6-test
  ipv4-subnet: 172.100.100.0/24 # 172.100.100.1 gateway
  ipv6-subnet: f0ca::/64

topology:
  nodes:
    frr1:
      kind: linux
      image: quay.io/frrouting/frr:master
      mgmt-ipv4: 172.100.100.101
      mgmt-ipv6: f0ca::101
      exec:
        - sysctl -w net.ipv6.conf.all.forwarding=1
        - sysctl -w net.ipv4.conf.all.forwarding=1
        # Включаем обработку SRH на всех интерфейсах, которые должны получать пакеты SRH
        - sysctl -w net.ipv6.conf.all.seg6_enabled=1
        - sysctl -w net.ipv6.conf.eth1.seg6_enabled=1
        - sysctl -w net.ipv6.conf.eth2.seg6_enabled=1
        - ip -6 addr add 2001:db8::1/128 dev lo
        - ip addr add 172.16.1.1/32 dev lo
        - ip -6 addr add 2001:db8:0:12::/127 dev eth1
        - ip -6 addr add 2001:db8:0:13::/127 dev eth2
        - ip addr add 10.1.1.2/24 dev eth5
        # Создаем правило, чтобы маршруты для префикса, лукапилось в таблице localsid
        - ip -6 rule add to 5f00:0:1::/64 lookup localsid
        # Создаем blackhole в таблице localsid, чтобы отбрасывать все пакеты, предназначенные для адресов в диапазоне localsid, но без явного совпадения
        - ip -6 route add blackhole default table localsid
        # Создаем маршрут в основной таблице маршрутизации для блока localsid, чтобы его можно было объявить в uderlay
        - ip -6 route add blackhole 5f00:0:1::/64
        # decap route
        - "ip -6 route add 5f00:0:1:0:e4:: encap seg6local action End.DX4 nh4 10.1.1.1 dev eth5 table localsid"
        # encap route 
        - "ip route add 10.8.8.0/24 encap seg6 mode encap segs 5f00:0:2:0:ed::,5f00:0:8:0:e4:: dev eth2"
        # End для транзитного трафика, снимает в SRH последний seg и передает дальше на обработку
        - "ip -6 route add 5f00:0:1:0:ed:: encap seg6local action End dev eth5 table localsid"
      binds:
        - frr1/daemons:/etc/frr/daemons
        - frr1/frr.conf:/etc/frr/frr.conf
        # Таблица localsid создается для хранения и обработки локальных SRv6 SID и реализации endpoint действий SRv6 на маршрутизаторе
        - iproute2/rt_tables:/etc/iproute2/rt_tables
      labels:
        graph-posX: "425"
        graph-posY: "215"
        graph-groupLabelPos: bottom-center

    frr2:
