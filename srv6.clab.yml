        # End for forward
        - "ip -6 route add 5f00:0:2:0:ed:: encap seg6local action End dev eth5 table localsid"
      binds:
        - frr2/daemons:/etc/frr/daemons
        - frr2/frr.conf:/etc/frr/frr.conf
        - iproute2/rt_tables:/etc/iproute2/rt_tables
      labels:
